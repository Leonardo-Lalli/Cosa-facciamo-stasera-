<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosa facciamo stasera?</title>
  <meta name="description" content="Scopri locali, eventi e serate vicino a te">
  <meta name="theme-color" content="#1a73e8">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Cosa <span id="verb">facciamo</span><br><span class="logo-highlight">stasera?</span></h1>
        <a href="https://github.com/Leonardo-Lalli/Cosa-facciamo-stasera-" target="_blank" class="github-link" title="GitHub">
          <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
        <button id="theme-toggle" title="Dark mode">🌙</button>
      </div>

      <div class="search-box">
        <input type="text" id="location-input" placeholder="Dove ti trovi? (es. Milano, Roma...)" autocomplete="off">
        <button id="locate-btn" title="Usa posizione attuale">📍</button>
      </div>

      <div id="weather-widget" class="weather-widget hidden"></div>

      <div class="filters" id="filters-wrap">
        <button id="filters-toggle" class="filters-toggle hidden">⚙️ Filtri ▾</button>
        <div class="filters-inner">
        <div class="filter-group">
          <label>Raggio (km)</label>
          <div class="range-wrap">
            <input type="range" id="radius-slider" min="1" max="50" value="10">
            <span id="radius-value">10 km</span>
          </div>
        </div>
        <div class="filter-group">
          <label>Mezzo di trasporto</label>
          <div class="transport-options">
            <button class="transport-btn active" data-mode="walking">🚶</button>
            <button class="transport-btn" data-mode="cycling">🚲</button>
            <button class="transport-btn" data-mode="transit">🚌</button>
            <button class="transport-btn" data-mode="driving">🚗</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Tempo massimo (minuti)</label>
          <div class="range-wrap">
            <input type="range" id="time-slider" min="5" max="120" value="60">
            <span id="time-value">60 min</span>
          </div>
        </div>
        <div class="filter-group">
          <label>Tipo locale</label>
          <div class="chip-container" id="type-filters">
            <button class="chip active" data-type="nightclub">Discoteche</button>
            <button class="chip active" data-type="bar">Bar</button>
            <button class="chip active" data-type="pub">Pub</button>
            <button class="chip active" data-type="cinema">Cinema</button>
            <button class="chip active" data-type="theatre">Teatri</button>
            <button class="chip active" data-type="restaurant">Ristoranti</button>
            <button class="chip" data-type="live_music">Musica dal vivo</button>
            <button class="chip" data-type="bowling">Bowling</button>
            <button class="chip" data-type="events_venue">Sale eventi</button>
            <button class="chip" data-type="dance_hall">Ballo</button>
            <button class="chip" data-type="casino">Casinò</button>
            <button class="chip" data-type="arcade">Sale giochi</button>
            <button class="chip" data-type="karaoke">Karaoke</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Opzioni rapide</label>
          <div class="chip-container">
            <button id="chip-opennow" class="chip special-chip">🕐 Aperto ora</button>
            <button id="chip-weekend" class="chip special-chip">🗓️ Weekend</button>
            <button id="chip-favorites" class="chip special-chip">⭐ Preferiti</button>
          </div>
        </div>
        </div>
      </div>

      <div class="action-bar">
        <button id="search-btn" class="btn-primary">🔍 Cerca locali</button>
      </div>

      <div id="planner-section" class="planner-section hidden">
        <div class="planner-header">
          <span>🤖 Programma per stasera</span>
          <button id="planner-btn" class="planner-generate-btn">Nascondi</button>
        </div>
        <div id="planner-output" class="planner-output"></div>
      </div>

      <div id="heatmap-toggle" class="heatmap-toggle hidden">
        <button id="heatmap-btn">📊 Mostra heatmap</button>
      </div>

      <!-- Mobile drawer -->
      <div id="results-drawer">
        <div class="drawer-handle"></div>
        <div id="results-header" class="results-header hidden">
          <div class="results-header-inner">
            <button id="back-btn">←</button>
            <span id="results-count">0 locali</span>
            <button id="random-btn" class="btn-random-small" title="A caso">🎰</button>
            <select id="sort-select">
              <option value="distance">Più vicini</option>
              <option value="time">Tempo minore</option>
              <option value="name">A-Z</option>
            </select>
          </div>
        </div>
        <div id="venue-list" class="venue-list"></div>
      </div>

      <div id="loading" class="loading hidden">Cercando i locali migliori...</div>
    </aside>

    <main id="map-container">
      <div id="map"></div>
      <button id="heatmap-fab" class="heatmap-fab hidden">🔥</button>
      <button id="mobile-fab" class="mobile-fab" style="display:none">📋 Lista locali</button>
    </main>

    <div id="venue-detail" class="venue-detail hidden">
      <button id="close-detail" class="close-btn">✕</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/safe.js"></script>
  <script src="js/api.js"></script>
  <script src="js/routing.js"></script>
  <script src="js/describer.js"></script>
  <script src="js/planner.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
